<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            padding:0;
            margin:0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .container{
            width: 400px;
        }
        .header{
            background-color: lightblue;
            display: flex;
            justify-content: center;
        }
        .header > .container{
            background-color: mediumblue;
            height:40px;
        }
        .footer{
            background-color: lightblue;
            display: flex;
            justify-content: center;
        }
        .footer > .container{
            background-color: rgb(115, 115, 115);
            height:40px;
        }
        .main
        {
            display: flex;
            justify-content: center;
        }
        .main > .container{
            display: flex;
            gap:10px;
        }
        .left{
            background-color: rgb(255, 233, 35);
            height: 300px;
            flex: auto;
            display: flex;
            gap: 10px;
        }
        .fx{
            background-color: brown;
            height: 100px;
            flex: auto;
        }

        .right{
            height: 200px;
            display: flex;
            flex-direction: column;
            gap:10px;
        }
        .item
        {
            background-color: rgb(47, 255, 134);
            height: 400px;
            width:90px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container"></div>
    </div>
    <div class="main">
        <div class="container">
            <div class="left">
                <div class="fx"></div>
                <div class="fx"></div>
            </div>
            <div class="right">
                <div class="item"></div>
                <div class="item"></div>
            </div>
        </div>
    </div>
    <div class="footer">
        <div class="container"><div>
    </div>
</body>
</html>
